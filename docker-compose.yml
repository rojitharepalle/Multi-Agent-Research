version: '3.9'

services:
  backend:
    build: ./backend
    container_name: research-backend
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - DATABASE_URL=sqlite+aiosqlite:////app/data/research.db
      - CHROMA_PERSIST_DIR=/app/data/chroma_db
      - CORS_ORIGINS=["http://localhost:80","http://localhost:5173","http://frontend"]
      - ENVIRONMENT=production
    volumes:
      - research_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: research-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  research_data:
